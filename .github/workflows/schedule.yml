name: Daily Morning Brief Generator

on:
  schedule:
    # 05:00 UTC corresponds to 06:00 CET (Paris time) in winter, and 07:00 CEST in summer.
    # We set it to 05:00 UTC.
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install -g @google/gemini-cli
        pip install -r requirements.txt

    - name: Configure Gemini CLI
      run: |
        mkdir -p ~/.gemini
        echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > ~/.gemini/token.json
        echo '${{ secrets.GOOGLE_CREDENTIALS_APP }}' > ~/.gemini/credentials.json
        echo '{"security":{"auth":{"selectedType":"oauth-personal"}},"models":{"model":"gemini-1.5-pro"}}' > ~/.gemini/settings.json

    - name: Run Morning Brief Script
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      run: python cloud_brief_engine.py
